name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./server
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run tests
        working-directory: ./server
        run: npm test

  ai-regression:
    runs-on: ubuntu-latest
    env:
      AI_MODEL_CHECKPOINT: levir_best.pth
      AI_MODEL_CHECKPOINT_URL: ${{ secrets.AI_MODEL_CHECKPOINT_URL }}
      AI_MODEL_INIT_SEED: "42"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate checkpoint URL is configured
        working-directory: ./ai-service
        run: |
          if [ -z "$AI_MODEL_CHECKPOINT_URL" ]; then
            echo "Missing required secret: AI_MODEL_CHECKPOINT_URL"
            echo "Set this repository secret so regression tests run against the intended model checkpoint."
            exit 1
          fi

      - name: Install AI service dependencies
        working-directory: ./ai-service
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run model regression suite
        working-directory: ./ai-service
        run: python -m unittest tests.model_regression_test -v

  deploy:
    needs: [test, ai-regression]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}