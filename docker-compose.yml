services:
  db:
    image: mysql:8
    container_name: illegal-construction-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: illegal-construction-detection-project
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    profiles:
      - full-stack
    build: ./server
    container_name: illegal-construction-api
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env.development
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:root@db:3306/illegal-construction-detection-project
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
    depends_on:
      - db
      - ai-service

  ai-service:
    profiles:
      - full-stack
    build: ./ai-service
    container_name: illegal-construction-ai
    restart: always
    ports:
      - "5002:5002"
    environment:
      - AI_SERVICE_API_KEY=change-me

  web:
    profiles:
      - full-stack
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Browser calls same origin; nginx proxies to api (see client/nginx.conf).
        VITE_API_URL: /api/v1
    container_name: illegal-construction-web
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mysql_data:
